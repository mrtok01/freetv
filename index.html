<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการเว็บของพี่ตุ๊ก</title>
    <style>
        /* สไตล์หน้าเว็บเรียบง่าย สบายตา */
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .menu-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #4a4a4a;
        }
        ul {
            list-style: none; /* เอาจุดไข่ปลาออก */
            padding: 0;
            margin: 0;
        }
        li {
            margin-bottom: 12px;
        }
        a {
            display: block;
            padding: 12px 15px;
            background-color: #007bff;
            color: white;
            text-decoration: none; /* เอาเส้นใต้脱ออก */
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            transition: background 0.2s;
        }
        a:hover {
            background-color: #0056b3; /* สีเข้มขึ้นตอนเอาเมาส์ไปชี้ */
        }
    </style>
</head>
<body>

<div class="menu-container">
    <h2>รายการเว็บไซต์</h2>

        <li><a href="https://mrtok01.github.io/freetv/freetv.html" target="_blank">ฟรีทีวีทดลอง</a></li>
        <li><a href="https://mrtok01.github.io/freetv/Clock.html" target="_blank">นาฬิกาดิจิตอล</a></li>
    </ul>
</div>

</body>
</html>
