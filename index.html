<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ฟรีทีวีไทย</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;min-height:100vh}
.header{background:#161b22;padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #30363d}
.header-title{color:#fff;font-size:18px;font-weight:600}
.search-wrap{padding:12px 16px;background:#161b22;border-bottom:1px solid #21262d}
.search-wrap input{width:100%;background:#21262d;border:1px solid #30363d;border-radius:8px;padding:8px 12px;color:#e6edf3;font-size:14px;outline:none}
.search-wrap input::placeholder{color:#8b949e}
.cat-bar{display:flex;gap:8px;padding:10px 16px;background:#161b22;overflow-x:auto;border-bottom:1px solid #21262d}
.cat-btn{background:transparent;border:1px solid #30363d;border-radius:20px;padding:5px 14px;color:#8b949e;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cat-btn.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.ch-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #21262d;cursor:pointer;text-decoration:none}
.ch-item:hover{background:#161b22}
.ch-num{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.ch-name{color:#e6edf3;font-size:15px;font-weight:500}
.ch-desc{color:#8b949e;font-size:12px;margin-top:2px}
.ch-arrow{color:#30363d;font-size:18px;margin-left:auto}
.empty{padding:32px 16px;text-align:center;color:#8b949e;font-size:14px}
</style>
</head>
<body>
<div class="header">
  <span style="font-size:22px">📺</span>
  <span class="header-title">ฟรีทีวีไทย ออนไลน์</span>
</div>
<div class="search-wrap">
  <input type="text" id="search" placeholder="🔍 ค้นหาช่อง...">
</div>
<div class="cat-bar" id="cats"></div>
<div id="list"></div>

<script>
const channels = [
  {num:"3",name:"ช่อง 3 HD",desc:"ช่อง 3 สด",cat:"บันเทิง",color:"#1f6feb",url:"https://www.ch3thailand.com/live"},
  {num:"7",name:"ช่อง 7 HD",desc:"ช่อง 7 สด",cat:"บันเทิง",color:"#d29922",url:"https://www.ch7.com/live"},
  {num:"ONE",name:"One 31",desc:"ช่อง ONE สด",cat:"บันเทิง",color:"#f85149",url:"https://www.one31.net/live"},
  {num:"GMM",name:"GMM 25",desc:"GMM 25 สด",cat:"บันเทิง",color:"#d2a8ff",url:"https://www.gmm25.com/live"},
  {num:"WP",name:"Workpoint TV",desc:"Workpoint สด",cat:"บันเทิง",color:"#f0883e",url:"https://www.workpointtv.com/live"},
  {num:"AM",name:"Amarin TV",desc:"Amarin HD สด",cat:"บันเทิง",color:"#da3633",url:"https://www.amarintv.com/live"},
  {num:"BG",name:"Bright TV",desc:"Bright TV สด",cat:"บันเทิง",color:"#d29922",url:"https://www.brighttv.co.th/live"},
  {num:"9",name:"MCOT HD",desc:"ช่อง 9 MCOT สด",cat:"ข่าว",color:"#388bfd",url:"https://www.mcot.net/live"},
  {num:"PP",name:"PPTV HD 36",desc:"PPTV สด",cat:"ข่าว",color:"#388bfd",url:"https://www.pptvhd36.com/live"},
  {num:"TNN",name:"TNN 16",desc:"TNN ช่องข่าว สด",cat:"ข่าว",color:"#388bfd",url:"https://www.tnnthailand.com/live"},
  {num:"NN",name:"Nation TV",desc:"Nation ข่าว สด",cat:"ข่าว",color:"#3fb950",url:"https://www.nationtv.tv/live"},
  {num:"SF",name:"Spring News",desc:"Spring News สด",cat:"ข่าว",color:"#3fb950",url:"https://www.springnews.co.th/live"},
  {num:"VTV",name:"Voice TV",desc:"Voice TV สด",cat:"ข่าว",color:"#8b949e",url:"https://www.voicetv.co.th/live"},
  {num:"NBT",name:"NBT",desc:"สถานีโทรทัศน์แห่งชาติ",cat:"ภาครัฐ",color:"#3fb950",url:"https://www.nbt.or.th/live"},
  {num:"PBS",name:"Thai PBS",desc:"ไทยพีบีเอส สด",cat:"ภาครัฐ",color:"#3fb950",url:"https://www.thaipbs.or.th/live"},
  {num:"5",name:"ช่อง 5 HD",desc:"ช่อง 5 กองทัพบก สด",cat:"ภาครัฐ",color:"#3fb950",url:"https://www.tv5hd.com/live"},
];

const cats = ["ทั้งหมด",...[...new Set(channels.map(c=>c.cat))]];
let activeCat = "ทั้งหมด", query = "";

function renderCats(){
  document.getElementById("cats").innerHTML = cats.map(c=>`<button class="cat-btn${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function renderList(){
  const f = channels.filter(c=>{
    const mc = activeCat==="ทั้งหมด"||c.cat===activeCat;
    const mq = !query||c.name.includes(query)||c.desc.includes(query);
    return mc&&mq;
  });
  const el = document.getElementById("list");
  if(!f.length){el.innerHTML=`<div class="empty">ไม่พบช่องที่ค้นหาครับ</div>`;return;}
  el.innerHTML = f.map(c=>`
    <a class="ch-item" href="${c.url}" target="_blank" rel="noopener">
      <div class="ch-num" style="background:${c.color}22;color:${c.color}">${c.num}</div>
      <div>
        <div class="ch-name">${c.name}</div>
        <div class="ch-desc">${c.desc}</div>
      </div>
      <span class="ch-arrow">›</span>
    </a>
  `).join("");
}

function setCat(c){activeCat=c;renderCats();renderList();}
document.getElementById("search").addEventListener("input",e=>{query=e.target.value;renderList();});
renderCats();renderList();
</script>
</body>
</html>
